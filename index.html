<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>CandleSniper VIP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .logo {
      width: 120px;
      height: 120px;

    }
    p {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #ffd700;
      color: #0a0a0a;
      font-weight: bold;
      padding: 15px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      box-shadow: 0 0 15px rgba(255,215,0,0.6);
      transition: all 0.3s;
    }
    .btn:hover {
      background: #ffea70;
      box-shadow: 0 0 25px rgba(255,215,0,0.9);
    }
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #666;

</head>
