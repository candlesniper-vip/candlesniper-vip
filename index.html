<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CandleSniper VIP - GitHub Edition</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0b0b0f; color:#fff; font-family:'Segoe UI',system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; }
    .topbar { background:#13131a; padding:10px 15px; display:flex; justify-content:space-between; border-bottom:1px solid #1e1e2a; }
    .pair { font-size:18px; font-weight:bold; }
    #chartContainer { flex:1; }
    .controls { background:#13131a; padding:10px 15px; border-top:1px solid #1e1e2a; display:flex; justify-content:space-between; }
    .controls button { background:#ffd700; color:#000; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; }
    .signals-strip { background:#0f0f16; padding:8px 15px; border-top:1px solid #1e1e2a; overflow-x:auto; white-space:nowrap; }
    .signal-tag { display:inline-block; margin-right:8px; padding:5px 12px; border-radius:12px; font-size:12px; }
    .signal-tag.up { background:#4caf50; color:#000; }
    .signal-tag.down { background:#f44336; color:#fff; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="pair" id="currentPair">EUR/USD OTC</div>
    <div id="signalCount">0 signals</div>
  </div>
  <div id="chartContainer"></div>
  <div id="pairSelector" style="display:flex; overflow-x:auto; padding:8px 15px; gap:8px; background:#0f0f16;"></div>
  <div class="controls">
    <div></div>
    <button onclick="openPocketOption()">Trade ↗</button>
  </div>
  <div class="signals-strip" id="signalsStrip"></div>

  <script>
    // ========== CONFIG ==========
    const GITHUB_REPO = "candlesniper-vip/candlesniper-data";  // your username/repo
    const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_REPO}/main`;
    const PAIRS = [
      "EURUSD_otc","GBPUSD_otc","USDJPY_otc","AUDUSD_otc",
      "USDCAD_otc","NZDUSD_otc","EURGBP_otc","EURJPY_otc",
      "GBPJPY_otc","BTCUSD_otc","ETHUSD_otc","LTCUSD_otc"
    ];

    let currentPair = PAIRS[0];

    // Chart setup
    const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
      layout: { backgroundColor: '#0b0b0f', textColor: '#d1d4dc' },
      grid: { vertLines: { color: '#1e1e2a' }, horzLines: { color: '#1e1e2a' } },
      timeScale: { timeVisible: true, secondsVisible: true },
    });
    const candleSeries = chart.addCandlestickSeries({
      upColor: '#4caf50', downColor: '#f44336', borderDownColor: '#f44336',
      borderUpColor: '#4caf50', wickDownColor: '#f44336', wickUpColor: '#4caf50',
    });

    // Pair selector
    const pairScroll = document.getElementById('pairSelector');
    PAIRS.forEach(p => {
      const el = document.createElement('span');
      el.style.cssText = "padding:6px 12px; border-radius:15px; background:#1e1e2a; color:#ccc; font-size:12px; cursor:pointer;";
      el.textContent = p.replace('_otc','');
      el.onclick = () => switchPair(p);
      pairScroll.appendChild(el);
    });

    function switchPair(pair) {
      currentPair = pair;
      document.getElementById('currentPair').textContent = pair.replace('_otc','');
      fetchCandles(pair);
    }

    async function fetchCandles(pair) {
      try {
        const resp = await fetch(`${RAW_BASE}/candles/${pair}.json`);
        const data = await resp.json();
        if (Array.isArray(data) && data.length > 0) {
          candleSeries.setData(data.map(c => ({
            time: c.time,
            open: c.open,
            high: c.high,
            low: c.low,
            close: c.close
          })));
          chart.timeScale().fitContent();
        }
      } catch(e) {}
    }

    async function updateSignals() {
      try {
        const resp = await fetch(`${RAW_BASE}/signals.json`);
        const signals = await resp.json();
        if (Array.isArray(signals)) {
          const strip = document.getElementById('signalsStrip');
          signals.sort((a,b) => b.timestamp - a.timestamp);
          strip.innerHTML = signals.slice(0,10).map(s => {
            const cls = s.direction === 'UP' ? 'up' : 'down';
            const emoji = s.direction === 'UP' ? '🟢' : '🔻';
            return `<span class="signal-tag ${cls}">${emoji} ${s.symbol} @ ${s.price.toFixed(5)}</span>`;
          }).join('');
          document.getElementById('signalCount').textContent = signals.length + ' signals';
        }
      } catch(e) {}
    }

    function openPocketOption() { window.open('https://pocketoption.com/en/terminal', '_blank'); }

    switchPair(currentPair);
    setInterval(updateSignals, 3000);
    setInterval(() => fetchCandles(currentPair), 3000);
  </script>
</body>
</html>
