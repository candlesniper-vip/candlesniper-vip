<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CandleSniper VIP</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b0f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      background: #13131a;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e1e2a;
    }
    .pair { font-size: 18px; font-weight: bold; }
    .signal-count { font-size: 14px; color: #888; }

    .pair-selector {
      background: #0f0f16;
      padding: 8px 10px;
      display: flex;
      overflow-x: auto;
      gap: 8px;
      border-bottom: 1px solid #1e1e2a;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .pair-btn {
      background: #1e1e2a;
      color: #ccc;
      border: none;
      padding: 7px 14px;
      border-radius: 18px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    .pair-btn.active {
      background: #ffd700;
      color: #000;
      font-weight: bold;
    }

    .chart-container { flex: 1; position: relative; }

    .controls {
      background: #13131a;
      padding: 10px 15px;
      border-top: 1px solid #1e1e2a;
      display: flex;
      justify-content: center;
    }
    .controls button {
      background: #ffd700;
      color: #000;
      border: none;
      padding: 10px 30px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
    }

    .signals-strip {
      background: #0f0f16;
      padding: 8px 15px;
      border-top: 1px solid #1e1e2a;
      overflow-x: auto;
      white-space: nowrap;
      min-height: 40px;
    }
    .signal-tag {
      display: inline-block;
      margin-right: 8px;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 12px;
    }
    .signal-tag.up { background: #4caf50; color: #000; }
    .signal-tag.down { background: #f44336; color: #fff; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="pair" id="currentPair">EUR/USD</div>
    <div class="signal-count" id="signalCount">0 signals</div>
  </div>
  <div class="pair-selector" id="pairSelector"></div>
  <div class="chart-container" id="chartContainer"></div>
  <div class="controls">
    <button onclick="window.open('https://pocketoption.com/en/terminal','_blank')">Trade ↗</button>
  </div>
  <div class="signals-strip" id="signalsStrip">
    <span class="signal-tag" style="color:#666;">Waiting for signals...</span>
  </div>

  <script>
    // ================== CONFIG ==================
    const RAW_BASE = "https://raw.githubusercontent.com/candlesniper-vip/candlesniper-data/main";

    // ALL OTC + LIVE PAIRS (from official PocketOption asset list)
    const ALL_PAIRS = [
      "EURUSD", "GBPUSD", "USDJPY", "USDCHF", "USDCAD", "AUDUSD", "NZDUSD",     // Major Forex
      "EURUSD_otc", "GBPUSD_otc", "USDJPY_otc", "USDCHF_otc", "USDCAD_otc", "AUDUSD_otc", // OTC Forex
      "AUDNZD_otc", "AUDCAD_otc", "AUDCHF_otc", "AUDJPY_otc", "CADCHF_otc", "CADJPY_otc",
      "CHFJPY_otc", "EURCHF_otc", "EURGBP_otc", "EURJPY_otc", "EURNZD_otc", "GBPAUD_otc",
      "GBPJPY_otc", "NZDJPY_otc", "NZDUSD_otc", "EURRUB_otc", "USDRUB_otc", "EURHUF_otc", "CHFNOK_otc",
      // Commodities
      "XAUUSD", "XAUUSD_otc", "XAGUSD", "XAGUSD_otc", "UKBrent", "UKBrent_otc", "USCrude", "USCrude_otc",
      "XNGUSD", "XNGUSD_otc", "XPTUSD", "XPTUSD_otc", "XPDUSD", "XPDUSD_otc",
      // Cryptocurrencies
      "BTCUSD", "ETHUSD", "DASH_USD", "BTCGBP", "BTCJPY", "BCHEUR", "BCHGBP", "BCHJPY", "DOTUSD", "LNKUSD",
      // Indices
      "SP500", "SP500_otc", "NASUSD", "NASUSD_otc", "DJI30", "DJI30_otc", "JPN225", "JPN225_otc",
      "D30EUR", "D30EUR_otc", "E50EUR", "E50EUR_otc", "F40EUR", "F40EUR_otc", "E35EUR", "E35EUR_otc",
      "100GBP", "100GBP_otc", "AUS200", "AUS200_otc", "CAC40", "AEX25", "SMI20", "H33HKD",
      // US Stocks
      "#AAPL", "#AAPL_otc", "#MSFT", "#MSFT_otc", "#TSLA", "#TSLA_otc", "#FB", "#FB_otc",
      "#AMZN_otc", "#NFLX", "#NFLX_otc", "#INTC", "#INTC_otc", "#BA", "#BA_otc",
      "#JPM", "#JNJ", "#JNJ_otc", "#PFE", "#PFE_otc", "#XOM", "#XOM_otc", "#AXP", "#AXP_otc",
      "#MCD", "#MCD_otc", "#CSCO", "#CSCO_otc", "#VISA_otc", "#CITI", "#CITI_otc", "#TWITTER", "#TWITTER_otc",
      "#BABA", "#BABA_otc", "#FDX_otc",
      // Additional
      "Microsoft_otc", "Facebook_OTC", "Tesla_otc", "Boeing_OTC", "American_Express_otc"
    ];

    let currentPair = ALL_PAIRS[0];
    let lastSignalCount = 0;

    // ------------- Chart Setup -------------
    const chartContainer = document.getElementById('chartContainer');
    const chart = LightweightCharts.createChart(chartContainer, {
      width: chartContainer.clientWidth,
      height: chartContainer.clientHeight,
      layout: { backgroundColor: '#0b0b0f', textColor: '#d1d4dc' },
      grid: { vertLines: { color: '#1e1e2a' }, horzLines: { color: '#1e1e2a' } },
      timeScale: { timeVisible: true, secondsVisible: true },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#2b2b3c' },
      localization: { priceFormatter: p => p.toFixed(5) },
    });
    const candleSeries = chart.addCandlestickSeries({
      upColor: '#4caf50', downColor: '#f44336',
      borderDownColor: '#f44336', borderUpColor: '#4caf50',
      wickDownColor: '#f44336', wickUpColor: '#4caf50',
    });

    // ------------- Build Pair Selector (all pairs) -------------
    const pairSelector = document.getElementById('pairSelector');
    function renderPairButtons() {
      pairSelector.innerHTML = '';
      ALL_PAIRS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'pair-btn' + (p === currentPair ? ' active' : '');
        // Clean up display name: remove _otc and # for readability
        btn.textContent = p.replace('_otc','').replace('#','');
        btn.onclick = () => switchPair(p);
        pairSelector.appendChild(btn);
      });
      // Scroll to active button if needed
      const activeBtn = pairSelector.querySelector('.active');
      if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    async function switchPair(pair) {
      currentPair = pair;
      document.getElementById('currentPair').textContent = pair.replace('_otc','');
      renderPairButtons();
      await loadCandles(pair);
    }

    async function loadCandles(pair) {
      try {
        const resp = await fetch(`${RAW_BASE}/candles/${pair}.json`);
        if (!resp.ok) throw new Error('No candle file');
        const data = await resp.json();
        if (Array.isArray(data) && data.length > 0) {
          candleSeries.setData(data.map(c => ({
            time: c.time,
            open: c.open,
            high: c.high,
            low: c.low,
            close: c.close
          })));
          chart.timeScale().fitContent();
        } else {
          candleSeries.setData([]);
        }
      } catch(e) {
        candleSeries.setData([]);
      }
    }

    // ------------- Signals + Notifications -------------
    async function loadSignals() {
      try {
        const resp = await fetch(`${RAW_BASE}/signals.json`);
        if (!resp.ok) return;
        const signals = await resp.json();
        if (Array.isArray(signals) && signals.length > 0) {
          signals.sort((a,b) => b.timestamp - a.timestamp);
          const strip = document.getElementById('signalsStrip');
          strip.innerHTML = signals.slice(0,10).map(s => {
            const cls = s.direction === 'UP' ? 'up' : 'down';
            const emoji = s.direction === 'UP' ? '🟢' : '🔻';
            return `<span class="signal-tag ${cls}">${emoji} ${s.symbol.replace('_otc','')} @ ${Number(s.price).toFixed(5)}</span>`;
          }).join('');
          document.getElementById('signalCount').textContent = signals.length + ' signals';

          // Browser notification for new signals
          if (signals.length > lastSignalCount && lastSignalCount > 0) {
            const latest = signals[0];
            if (Notification.permission === 'granted') {
              new Notification(`CandleSniper ${latest.direction} Signal`, {
                body: `${latest.symbol} @ ${Number(latest.price).toFixed(5)} — ${latest.time_left}s left`,
                vibrate: [200,100,200]
              });
            }
          }
          lastSignalCount = signals.length;
        }
      } catch(e) {}
    }

    // Request notification permission
    if ('Notification' in window && Notification.permission !== 'denied') {
      Notification.requestPermission();
    }

    // Auto‑refresh
    setInterval(() => {
      loadCandles(currentPair);
      loadSignals();
    }, 5000);

    // Initial load
    renderPairButtons();
    switchPair(currentPair);

    window.addEventListener('resize', () => {
      chart.resize(chartContainer.clientWidth, chartContainer.clientHeight);
    });
  </script>
</body>
</html>
