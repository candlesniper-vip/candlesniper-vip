<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CandleSniper VIP</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0b0b0f; color:#fff; font-family:'Segoe UI',system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    /* Top bar like Pocket Option */
    .topbar { background:#13131a; padding:10px 15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e1e2a; }
    .topbar .pair { font-size:18px; color:#fff; font-weight:bold; }
    .topbar .balance { font-size:14px; color:#888; }
    /* Chart area */
    #chartContainer { flex:1; width:100%; position:relative; background:#0b0b0f; }
    /* Bottom control bar */
    .controls { background:#13131a; padding:10px 15px; border-top:1px solid #1e1e2a; display:flex; justify-content:space-between; align-items:center; }
    .controls button { background:#ffd700; color:#000; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; font-size:14px; }
    .timeframe-btns { display:flex; gap:8px; }
    .timeframe-btns span { background:#1e1e2a; color:#ccc; padding:6px 12px; border-radius:15px; font-size:12px; cursor:pointer; }
    .timeframe-btns span.active { background:#ffd700; color:#000; }
    /* Signal strip at bottom */
    .signals-strip { background:#0f0f16; padding:8px 15px; border-top:1px solid #1e1e2a; overflow-x:auto; white-space:nowrap; }
    .signal-tag { display:inline-block; margin-right:8px; padding:5px 12px; border-radius:12px; font-size:12px; }
    .signal-tag.up { background:#4caf50; color:#000; }
    .signal-tag.down { background:#f44336; color:#fff; }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <div class="pair" id="currentPair">EUR/USD OTC</div>
    <div class="balance" id="signalCount">0 signals</div>
  </div>

  <!-- Chart (lightweight charts) -->
  <div id="chartContainer"></div>

  <!-- Pair selector -->
  <div style="display:flex; overflow-x:auto; padding:8px 15px; gap:8px; background:#0f0f16; border-top:1px solid #1e1e2a;">
    <!-- pairs injected by JS -->
    <div class="pair-scroll" id="pairSelector"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="timeframe-btns">
      <span class="active" onclick="alert('Only 15s available')">15s</span>
      <span onclick="alert('Only 15s available')">30s</span>
      <span onclick="alert('Only 15s available')">1m</span>
    </div>
    <button onclick="openPocketOption()">Trade ↗</button>
  </div>

  <!-- Recent signals strip -->
  <div class="signals-strip" id="signalsStrip">
    <span class="signal-tag">Waiting for signals...</span>
  </div>

  <!-- lightweight-charts library -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    // ========== FIREBASE CONFIG ==========
    const FIREBASE_URL = "https://candlesniper-vip-default-rtdb.firebaseio.com/";
    const PAIRS = [
      "EURUSD_otc","GBPUSD_otc","USDJPY_otc","AUDUSD_otc",
      "USDCAD_otc","NZDUSD_otc","EURGBP_otc","EURJPY_otc",
      "GBPJPY_otc","BTCUSD_otc","ETHUSD_otc","LTCUSD_otc"
    ];

    // ========== CHART INIT ==========
    const chart = LightweightCharts.createChart(document.getElementById('chartContainer'), {
      width: document.getElementById('chartContainer').clientWidth,
      height: document.getElementById('chartContainer').clientHeight,
      layout: {
        backgroundColor: '#0b0b0f',
        textColor: '#d1d4dc',
      },
      grid: {
        vertLines: { color: '#1e1e2a' },
        horzLines: { color: '#1e1e2a' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#2b2b3c' },
      timeScale: { borderColor: '#2b2b3c', timeVisible: true, secondsVisible: true },
      localization: { priceFormatter: price => price.toFixed(5) },
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: '#4caf50', downColor: '#f44336', borderDownColor: '#f44336',
      borderUpColor: '#4caf50', wickDownColor: '#f44336', wickUpColor: '#4caf50',
    });

    // ========== PAIR SELECTOR ==========
    let currentPair = PAIRS[0];
    const pairScroll = document.getElementById('pairSelector');
    PAIRS.forEach(p => {
      const el = document.createElement('div');
      el.className = 'timeframe-btns';
      el.innerHTML = `<span>${p.replace('_otc','')}</span>`;
      el.onclick = () => switchPair(p);
      pairScroll.appendChild(el);
    });
    function switchPair(pair) {
      currentPair = pair;
      document.getElementById('currentPair').textContent = pair.replace('_otc','');
      fetchCandles(pair);
    }

    // ========== FETCH CANDLES FROM FIREBASE ==========
    async function fetchCandles(pair) {
      const resp = await fetch(`${FIREBASE_URL}candles/${pair}.json`);
      const data = await resp.json();
      if (!data) return;
      const candleArr = Object.values(data).sort((a,b) => a.time - b.time);
      const formatted = candleArr.map(c => ({
        time: c.time,
        open: c.open,
        high: c.high,
        low: c.low,
        close: c.close
      }));
      if (formatted.length > 0) {
        candleSeries.setData(formatted);
        chart.timeScale().fitContent();
      }
    }

    // ========== UPDATE CANDLES VIA POLLING ==========
    async function updateCandles() {
      fetchCandles(currentPair);
      // Also update signals strip
      const signalsResp = await fetch(`${FIREBASE_URL}signals.json?orderBy="timestamp"&limitToLast=10`);
      const signalsData = await signalsResp.json();
      if (signalsData) {
        const signals = Object.values(signalsData).sort((a,b) => b.timestamp - a.timestamp);
        const strip = document.getElementById('signalsStrip');
        strip.innerHTML = signals.slice(0,10).map(s => {
          const cls = s.direction === 'UP' ? 'up' : 'down';
          const emoji = s.direction === 'UP' ? '🟢' : '🔻';
          return `<span class="signal-tag ${cls}">${emoji} ${s.symbol} @ ${s.price.toFixed(5)}</span>`;
        }).join('');
        document.getElementById('signalCount').textContent = signals.length + ' signals';
      }
      // Resize chart to container
      chart.resize(document.getElementById('chartContainer').clientWidth, document.getElementById('chartContainer').clientHeight);
    }

    function openPocketOption() {
      window.open('https://pocketoption.com/en/terminal', '_blank');
    }

    // Initial load
    switchPair(currentPair);
    setInterval(updateCandles, 3000);
    window.addEventListener('resize', () => {
      chart.resize(document.getElementById('chartContainer').clientWidth, document.getElementById('chartContainer').clientHeight);
    });
  </script>
</body>
</html>
